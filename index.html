<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Calculator 1 -->
  <div class="calculator" id="calculator1">
    <input type="number" id="num1" placeholder="Number 1">
    <select id="operation">
      <option value="add">Add</option>
      <option value="subtract">Subtract</option>
    </select>
    <input type="number" id="num2" placeholder="Number 2">
    <div class="btn-row">
      <button class="btn-calculate" data-action="calculate">Calculate</button>
      <button class="btn-operator" data-action="percentage">%</button>
      <button class="btn-basic" data-action="sqrt">√</button>
      <button class="btn-basic" data-action="invert">±</button>
      <button class="btn-basic" data-action="double">2×</button>
    </div>
    <div class="btn-row">
      <button class="btn-mode" data-action="toggleScientific">Scientific Mode</button>
    </div>
    <div class="scientific-panel" id="scientific1">
      <div class="btn-row">
        <button class="btn-scientific" data-action="sin">sin</button>
        <button class="btn-scientific" data-action="cos">cos</button>
        <button class="btn-scientific" data-action="tan">tan</button>
      </div>
      <div class="btn-row">
        <button class="btn-scientific" data-action="log">log₁₀</button>
        <button class="btn-scientific" data-action="ln">ln</button>
        <button class="btn-scientific" data-action="exp">eˣ</button>
      </div>
    </div>
    <div class="result-display" id="result" role="status" aria-live="polite"></div>
  </div>

  <!-- Calculator 2 -->
  <div class="calculator" id="calculator2">
    <input type="number" id="num1Duplicate" placeholder="Number 1">
    <select id="operationDuplicate">
      <option value="add">Add</option>
      <option value="subtract">Subtract</option>
    </select>
    <input type="number" id="num2Duplicate" placeholder="Number 2">
    <div class="btn-row">
      <button class="btn-calculate" data-action="calculate">Calculate</button>
      <button class="btn-operator" data-action="percentage">%</button>
      <button class="btn-basic" data-action="sqrt">√</button>
      <button class="btn-basic" data-action="invert">±</button>
      <button class="btn-basic" data-action="double">2×</button>
    </div>
    <div class="btn-row">
      <button class="btn-mode" data-action="toggleScientific">Scientific Mode</button>
    </div>
    <div class="scientific-panel" id="scientific2">
      <div class="btn-row">
        <button class="btn-scientific" data-action="sin">sin</button>
        <button class="btn-scientific" data-action="cos">cos</button>
        <button class="btn-scientific" data-action="tan">tan</button>
      </div>
      <div class="btn-row">
        <button class="btn-scientific" data-action="log">log₁₀</button>
        <button class="btn-scientific" data-action="ln">ln</button>
        <button class="btn-scientific" data-action="exp">eˣ</button>
      </div>
    </div>
    <div class="result-display" id="resultDuplicate" role="status" aria-live="polite"></div>
  </div>

  <script type="module">
    import { IU } from './iu.js';

    const calc1 = new IU({
      num1Id: 'num1',
      num2Id: 'num2',
      operationId: 'operation',
      resultId: 'result',
      scientificPanelId: 'scientific1',
    });
    calc1.init(document.getElementById('calculator1'));

    const calc2 = new IU({
      num1Id: 'num1Duplicate',
      num2Id: 'num2Duplicate',
      operationId: 'operationDuplicate',
      resultId: 'resultDuplicate',
      scientificPanelId: 'scientific2',
    });
    calc2.init(document.getElementById('calculator2'));
  </script>
</body>
</html>
