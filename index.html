<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Calculator 1 -->
  <div class="calculator" id="calculator1">
    <input type="number" id="num1" placeholder="Number 1">
    <select id="operation">
      <option value="add">Add</option>
      <option value="subtract">Subtract</option>
    </select>
    <input type="number" id="num2" placeholder="Number 2">
    <div class="btn-row">
      <button class="btn-calculate" onclick="runCalculate()">Calculate</button>
      <button class="btn-calculate" onclick="runCalculate()">Calculate</button>
      <button class="btn-operator" onclick="runPercentage()">%</button>
      <button class="btn-operator" onclick="runPercentage()">%</button>
      <button class="btn-basic" onclick="runSqrt()">√</button>
      <button class="btn-basic" onclick="runSqrt()">√</button>
    </div>
    <div class="btn-row">
      <button class="btn-mode" onclick="toggleScientific('scientific1')">Scientific Mode</button>
      <button class="btn-mode" onclick="toggleScientific('scientific1')">Scientific Mode</button>
    </div>
    <div class="scientific-panel" id="scientific1">
      <div class="btn-row">
        <button class="btn-scientific" onclick="runSin()">sin</button>
        <button class="btn-scientific" onclick="runSin()">sin</button>
        <button class="btn-scientific" onclick="runCos()">cos</button>
        <button class="btn-scientific" onclick="runCos()">cos</button>
        <button class="btn-scientific" onclick="runTan()">tan</button>
        <button class="btn-scientific" onclick="runTan()">tan</button>
      </div>
      <div class="btn-row">
        <button class="btn-scientific" onclick="runLog()">log₁₀</button>
        <button class="btn-scientific" onclick="runLog()">log₁₀</button>
        <button class="btn-scientific" onclick="runLn()">ln</button>
        <button class="btn-scientific" onclick="runLn()">ln</button>
        <button class="btn-scientific" onclick="runExp()">eˣ</button>
        <button class="btn-scientific" onclick="runExp()">eˣ</button>
      </div>
    </div>
    <div class="result-display" id="result" role="status" aria-live="polite"></div>
  </div>

  <!-- Calculator 2 -->
  <div class="calculator" id="calculator2">
    <input type="number" id="num1Duplicate" placeholder="Number 1">
    <select id="operationDuplicate">
      <option value="add">Add</option>
      <option value="subtract">Subtract</option>
    </select>
    <input type="number" id="num2Duplicate" placeholder="Number 2">
    <div class="btn-row">
      <button class="btn-calculate btn-height-adjust" onclick="runCalculateDuplicate()">Calculate</button>
      <button class="btn-operator btn-height-adjust" onclick="runPercentageDuplicate()">%</button>
      <button class="btn-basic btn-height-adjust" onclick="runSqrtDuplicate()">√</button>
    </div>
    <button class="btn-mode btn-height-adjust" onclick="toggleScientific('scientific2')">Scientific Mode</button>
    <div class="scientific-panel" id="scientific2">
      <div class="btn-row">
        <button class="btn-scientific btn-height-adjust" onclick="runSinDuplicate()">sin</button>
        <button class="btn-scientific btn-height-adjust" onclick="runCosDuplicate()">cos</button>
        <button class="btn-scientific btn-height-adjust" onclick="runTanDuplicate()">tan</button>
      </div>
      <div class="btn-row">
        <button class="btn-scientific btn-height-adjust" onclick="runLogDuplicate()">log₁₀</button>
        <button class="btn-scientific btn-height-adjust" onclick="runLnDuplicate()">ln</button>
        <button class="btn-scientific btn-height-adjust" onclick="runExpDuplicate()">eˣ</button>
      <button class="btn-calculate" onclick="runCalculateDuplicate()">Calculate</button>
      <button class="btn-calculate" onclick="runCalculateDuplicate()">Calculate</button>
      <button class="btn-operator" onclick="runPercentageDuplicate()">%</button>
      <button class="btn-operator" onclick="runPercentageDuplicate()">%</button>
      <button class="btn-basic" onclick="runSqrtDuplicate()">√</button>
      <button class="btn-basic" onclick="runSqrtDuplicate()">√</button>
    </div>
    <div class="btn-row">
      <button class="btn-mode" onclick="toggleScientific('scientific2')">Scientific Mode</button>
      <button class="btn-mode" onclick="toggleScientific('scientific2')">Scientific Mode</button>
    </div>
    <div class="scientific-panel" id="scientific2">
      <div class="btn-row">
        <button class="btn-scientific" onclick="runSinDuplicate()">sin</button>
        <button class="btn-scientific" onclick="runSinDuplicate()">sin</button>
        <button class="btn-scientific" onclick="runCosDuplicate()">cos</button>
        <button class="btn-scientific" onclick="runCosDuplicate()">cos</button>
        <button class="btn-scientific" onclick="runTanDuplicate()">tan</button>
        <button class="btn-scientific" onclick="runTanDuplicate()">tan</button>
      </div>
      <div class="btn-row">
        <button class="btn-scientific" onclick="runLogDuplicate()">log₁₀</button>
        <button class="btn-scientific" onclick="runLogDuplicate()">log₁₀</button>
        <button class="btn-scientific" onclick="runLnDuplicate()">ln</button>
        <button class="btn-scientific" onclick="runLnDuplicate()">ln</button>
        <button class="btn-scientific" onclick="runExpDuplicate()">eˣ</button>
        <button class="btn-scientific" onclick="runExpDuplicate()">eˣ</button>
      </div>
    </div>
    <div class="result-display" id="resultDuplicate" role="status" aria-live="polite"></div>
  </div>

  <script>
    function toggleScientific(panelId) {
      const panel = document.getElementById(panelId);
      panel.classList.toggle('visible');
    }

    /* ---- Calculator 1 ---- */

    function runCalculate() {
      const num1 = parseFloat(document.getElementById('num1').value);
      const num2 = parseFloat(document.getElementById('num2').value);
      const operation = document.getElementById('operation').value;
      let result;
      if (operation === 'add') {
        result = num1 + num2;
      } else if (operation === 'subtract') {
        result = num1 - num2;
      }
      document.getElementById('result').textContent = 'Result: ' + result;
    }

    function runPercentage() {
      const num1 = parseFloat(document.getElementById('num1').value);
      const result = num1 / 100;
      document.getElementById('result').textContent = 'Result: ' + result;
    }

    function runSqrt() {
      const num1 = parseFloat(document.getElementById('num1').value);
      if (num1 < 0) {
        document.getElementById('result').textContent = 'Error: Cannot take square root of a negative number';
        return;
      }
      const result = Math.sqrt(num1);
      document.getElementById('result').textContent = 'Result: ' + result;
    }

    function runSin() {
      const num1 = parseFloat(document.getElementById('num1').value);
      const result = Math.sin(num1);
      document.getElementById('result').textContent = 'Result: ' + result;
    }

    function runCos() {
      const num1 = parseFloat(document.getElementById('num1').value);
      const result = Math.cos(num1);
      document.getElementById('result').textContent = 'Result: ' + result;
    }

    function runTan() {
      const num1 = parseFloat(document.getElementById('num1').value);
      const result = Math.tan(num1);
      document.getElementById('result').textContent = 'Result: ' + result;
    }

    function runLog() {
      const num1 = parseFloat(document.getElementById('num1').value);
      if (num1 <= 0) {
        document.getElementById('result').textContent = 'Error: log requires a positive number';
        return;
      }
      const result = Math.log10(num1);
      document.getElementById('result').textContent = 'Result: ' + result;
    }

    function runLn() {
      const num1 = parseFloat(document.getElementById('num1').value);
      if (num1 <= 0) {
        document.getElementById('result').textContent = 'Error: ln requires a positive number';
        return;
      }
      const result = Math.log(num1);
      document.getElementById('result').textContent = 'Result: ' + result;
    }

    function runExp() {
      const num1 = parseFloat(document.getElementById('num1').value);
      const result = Math.exp(num1);
      document.getElementById('result').textContent = 'Result: ' + result;
    }

    /* ---- Calculator 2 (Duplicate) ---- */

    function runCalculateDuplicate() {
      const num1 = parseFloat(document.getElementById('num1Duplicate').value);
      const num2 = parseFloat(document.getElementById('num2Duplicate').value);
      const operation = document.getElementById('operationDuplicate').value;
      let result;
      if (operation === 'add') {
        result = num1 + num2;
      } else if (operation === 'subtract') {
        result = num1 - num2;
      }
      document.getElementById('resultDuplicate').textContent = 'Result: ' + result;
    }

    function runPercentageDuplicate() {
      const num1 = parseFloat(document.getElementById('num1Duplicate').value);
      const result = num1 / 100;
      document.getElementById('resultDuplicate').textContent = 'Result: ' + result;
    }

    function runSqrtDuplicate() {
      const num1 = parseFloat(document.getElementById('num1Duplicate').value);
      if (num1 < 0) {
        document.getElementById('resultDuplicate').textContent = 'Error: Cannot take square root of a negative number';
        return;
      }
      const result = Math.sqrt(num1);
      document.getElementById('resultDuplicate').textContent = 'Result: ' + result;
    }

    function runSinDuplicate() {
      const num1 = parseFloat(document.getElementById('num1Duplicate').value);
      const result = Math.sin(num1);
      document.getElementById('resultDuplicate').textContent = 'Result: ' + result;
    }

    function runCosDuplicate() {
      const num1 = parseFloat(document.getElementById('num1Duplicate').value);
      const result = Math.cos(num1);
      document.getElementById('resultDuplicate').textContent = 'Result: ' + result;
    }

    function runTanDuplicate() {
      const num1 = parseFloat(document.getElementById('num1Duplicate').value);
      const result = Math.tan(num1);
      document.getElementById('resultDuplicate').textContent = 'Result: ' + result;
    }

    function runLogDuplicate() {
      const num1 = parseFloat(document.getElementById('num1Duplicate').value);
      if (num1 <= 0) {
        document.getElementById('resultDuplicate').textContent = 'Error: log requires a positive number';
        return;
      }
      const result = Math.log10(num1);
      document.getElementById('resultDuplicate').textContent = 'Result: ' + result;
    }

    function runLnDuplicate() {
      const num1 = parseFloat(document.getElementById('num1Duplicate').value);
      if (num1 <= 0) {
        document.getElementById('resultDuplicate').textContent = 'Error: ln requires a positive number';
        return;
      }
      const result = Math.log(num1);
      document.getElementById('resultDuplicate').textContent = 'Result: ' + result;
    }

    function runExpDuplicate() {
      const num1 = parseFloat(document.getElementById('num1Duplicate').value);
      const result = Math.exp(num1);
      document.getElementById('resultDuplicate').textContent = 'Result: ' + result;
    }
  </script>
</body>
</html>
